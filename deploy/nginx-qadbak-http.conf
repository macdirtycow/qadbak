# Nginx without panel TLS (no Let's Encrypt cert yet, or panel host was a bare IP).
# Customer domains → Apache; panel → Qadbak on HTTP only. Use :11000 or certbot + full template.
#
# scripts/apply-hosting-nginx.sh substitutes __DEFAULT_SERVER__ with
# " default_server" (fresh install) or empty when the qadbak-default-deny
# vhost is enabled. See scripts/lib/nginx-listen.sh.

# --- HTTP: panel hostname → Qadbak (no HTTPS redirect) ---
server {
    listen 80;
    listen [::]:80;
    server_name __PANEL_HTTP_NAMES__;

    client_max_body_size 100g;

    location /ws/domain-terminal {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /ws/admin-terminal {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Webmin embed optional — include deploy/nginx-webmin-embed-snippet.conf when break-glass needed

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
}

# --- HTTP: customer domains, bare IP, unknown Host → Apache ---
server {
    listen 80__DEFAULT_SERVER__;
    listen [::]:80__DEFAULT_SERVER__;
    server_name _;

    location / {
        proxy_pass http://__APACHE_BACKEND__;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
