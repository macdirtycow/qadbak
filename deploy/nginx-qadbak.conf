# Nginx on 80/443:
#   - __PANEL_HOST__ / __SERVER_FQDN__ → Qadbak (panel + marketing)
#   - default_server (other Host headers) → VirtualMin/Apache at __APACHE_BACKEND__
# Panel-only access via IP: use scripts/enable-panel-port.sh (e.g. :11000).
# VirtualMin/Webmin API stays on :10000.
#
# Install: install/qadbak-install.sh substitutes __PANEL_HOST__, __SERVER_FQDN__, __APACHE_BACKEND__
# Manual:  scripts/apply-hosting-nginx.sh

# --- HTTP: known hostnames → HTTPS panel ---
server {
    listen 80;
    listen [::]:80;
    server_name __PANEL_HOST__ www.__PANEL_HOST__ __SERVER_FQDN__;
    return 301 https://__PANEL_HOST__$request_uri;
}

# --- HTTP: customer domains, bare IP, unknown Host → Apache (VirtualMin sites) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://__APACHE_BACKEND__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS: panel domain + server FQDN → Qadbak ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __PANEL_HOST__ __SERVER_FQDN__;

    ssl_certificate     /etc/letsencrypt/live/__PANEL_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_HOST__/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__PANEL_HOST__;
    ssl_certificate     /etc/letsencrypt/live/__PANEL_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_HOST__/privkey.pem;
    return 301 https://__PANEL_HOST__$request_uri;
}
