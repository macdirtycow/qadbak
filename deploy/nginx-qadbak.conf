# Nginx reverse proxy for Qadbak at https://qadbak.com
# Place in /etc/nginx/sites-available/qadbak and symlink to sites-enabled.
# Certbot: certbot certonly --nginx -d qadbak.com -d www.qadbak.com
# For another hostname, replace qadbak.com or use install/qadbak-install.sh (substitutes PANEL_HOSTNAME).

server {
    listen 80;
    server_name qadbak.com www.qadbak.com;
    return 301 https://qadbak.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.qadbak.com;
    return 301 https://qadbak.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name qadbak.com;

    ssl_certificate     /etc/letsencrypt/live/qadbak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qadbak.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
