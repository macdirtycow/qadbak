# Nginx on 80/443:
#   - __PANEL_HOST__ / __SERVER_FQDN__ → Qadbak (panel + marketing)
#   - fallback (other Host headers) → VirtualMin/Apache at __APACHE_BACKEND__
# Panel-only access via IP: use scripts/enable-panel-port.sh (e.g. :11000).
# VirtualMin/Webmin API stays on :10000.
#
# Install: scripts/apply-hosting-nginx.sh substitutes __PANEL_HOST__,
# __SERVER_FQDN__, __APACHE_BACKEND__ and __DEFAULT_SERVER__.
#
# __DEFAULT_SERVER__ is replaced with " default_server" on fresh installs
# (legacy fallback claims default_server) or empty when the operator has
# enabled scripts/apply-nginx-default-deny.sh — that vhost owns the
# default_server slot and any duplicate would crash nginx with
# [emerg] a duplicate default server. See scripts/lib/nginx-listen.sh.

# --- HTTP: known hostnames → HTTPS panel ---
server {
    listen 80;
    listen [::]:80;
    server_name __PANEL_HTTP_NAMES__;
    return 301 https://__PANEL_HOST__$request_uri;
}

# --- HTTP: customer domains, bare IP, unknown Host → Apache (VirtualMin sites) ---
server {
    listen 80__DEFAULT_SERVER__;
    listen [::]:80__DEFAULT_SERVER__;
    server_name _;

    location / {
        proxy_pass http://__APACHE_BACKEND__;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS: panel domain + server FQDN → Qadbak ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __PANEL_TLS_NAMES__;

    ssl_certificate     /etc/letsencrypt/live/__SSL_CERT_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SSL_CERT_HOST__/privkey.pem;

    client_max_body_size 100g;

    location /ws/domain-terminal {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /ws/admin-terminal {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Webmin embed optional — include deploy/nginx-webmin-embed-snippet.conf when break-glass needed

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__PANEL_HOST__;
    ssl_certificate     /etc/letsencrypt/live/__SSL_CERT_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SSL_CERT_HOST__/privkey.pem;
    return 301 https://__PANEL_HOST__$request_uri;
}
