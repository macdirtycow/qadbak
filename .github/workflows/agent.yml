name: Agent

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent.yml"
  pull_request:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent.yml"

concurrency:
  group: agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: go test
        run: go test ./...

      - name: Build release binaries
        run: bash scripts/build-release.sh

      - name: Verify iOS bundled agent matches source build
        working-directory: .
        run: bash scripts/verify-agent-bundle.sh

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qadbak-agent-dist
          path: |
            agent/dist/qadbak-agent-linux-amd64
            agent/dist/qadbak-agent-linux-arm64
            agent/dist/manifest.json
            agent/dist/SHA256SUMS
