name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-support:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Linux distro unit tests
        run: bash scripts/test-linux-distro.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Panel-only preflight (Node on runner)
        run: bash scripts/check-linux-support.sh --panel-only

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          SESSION_SECRET: ci-build-secret-minimum-32-characters-long

  e2e:
    runs-on: ubuntu-latest
    needs: [linux-support, build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E (mock mode)
        run: npm run test:e2e
        env:
          SESSION_SECRET: ci-e2e-secret-minimum-32-characters-long
          QADBAK_LEGACY_API_MOCK: "true"
          E2E_PORT: "3099"
          CI: "true"
